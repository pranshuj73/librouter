# Internal LLM Gateway — production config.
# Dev overrides live in config.dev.yaml (loaded via GATEWAY_CONFIG env var).

provider_mode: real        # real | mock         (env override: GATEWAY_PROVIDER_MODE)
secrets_mode: env          # env  | mock         (env override: GATEWAY_SECRETS_MODE)

tiers:
  fast:
    - { provider: anthropic, model: claude-haiku-4-5,  weight: 50 }
    - { provider: openai,    model: gpt-4o-mini,       weight: 30 }
    - { provider: google,    model: gemini-2.5-flash,  weight: 20 }
  smart:
    - { provider: anthropic, model: claude-sonnet-4-6, weight: 40 }
    - { provider: openai,    model: gpt-4o,            weight: 40 }
    - { provider: google,    model: gemini-2.5-pro,    weight: 20 }

routing:
  refresh_interval_ms: 1000
  health_window_s: 60
  target_latency_s: 3.0
  min_weight_floor: 0.02
  rng_seed_env: GATEWAY_RNG_SEED

prices:
  # USD per 1M tokens
  anthropic/claude-haiku-4-5:  { input: 1.00,  output: 5.00 }
  anthropic/claude-sonnet-4-6: { input: 3.00,  output: 15.00 }
  openai/gpt-4o-mini:          { input: 0.15,  output: 0.60 }
  openai/gpt-4o:               { input: 2.50,  output: 10.00 }
  google/gemini-2.5-flash:     { input: 0.30,  output: 2.50 }
  google/gemini-2.5-pro:       { input: 1.25,  output: 10.00 }

rate_limits:
  # per-minute fleet-wide (Redis enforces globally)
  anthropic/claude-haiku-4-5:  { rpm: 4000, tpm: 400000 }
  anthropic/claude-sonnet-4-6: { rpm: 1000, tpm: 200000 }
  openai/gpt-4o-mini:          { rpm: 5000, tpm: 800000 }
  openai/gpt-4o:               { rpm: 1000, tpm: 200000 }
  google/gemini-2.5-flash:     { rpm: 2000, tpm: 400000 }
  google/gemini-2.5-pro:       { rpm: 1000, tpm: 200000 }

callers:
  - { name: search-svc,    key_hash: "sha256:REPLACE_AT_ONBOARDING_SEARCH",   daily_token_cap: 10000000 }
  - { name: chat-svc,      key_hash: "sha256:REPLACE_AT_ONBOARDING_CHAT",     daily_token_cap: 20000000 }
  - { name: docs-svc,      key_hash: "sha256:REPLACE_AT_ONBOARDING_DOCS",     daily_token_cap: 5000000  }
  - { name: ops-svc,       key_hash: "sha256:REPLACE_AT_ONBOARDING_OPS",      daily_token_cap: 2000000  }
  - { name: analytics-svc, key_hash: "sha256:REPLACE_AT_ONBOARDING_ANALYTICS", daily_token_cap: 3000000 }
  - { name: notify-svc,    key_hash: "sha256:REPLACE_AT_ONBOARDING_NOTIFY",   daily_token_cap: 1000000  }
