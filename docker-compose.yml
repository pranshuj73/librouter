volumes:
  gateway_pg_data:
  gateway_redis_data:

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
      POSTGRES_DB: gateway
    ports: ["5432:5432"]
    volumes:
      - gateway_pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "gateway"]
      interval: 2s
      timeout: 2s
      retries: 30

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports: ["6379:6379"]
    volumes:
      - gateway_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30

  gateway:
    build: .
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      GATEWAY_DB_DSN: postgres://gateway:gateway@postgres:5432/gateway
      GATEWAY_REDIS_URL: redis://redis:6379/0
      GATEWAY_CONFIG: /code/config.dev.yaml
      GATEWAY_PROVIDER_MODE: mock
      GATEWAY_SECRETS_MODE: mock
    ports: ["8000:8000"]
