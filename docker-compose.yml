volumes:
  gateway_pg_data:
  gateway_redis_data:

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
      POSTGRES_DB: gateway
    ports: ["5432:5432"]
    volumes:
      - gateway_pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "gateway"]
      interval: 2s
      timeout: 2s
      retries: 30

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports: ["6379:6379"]
    volumes:
      - gateway_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30

  gateway:
    build: .
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      GATEWAY_DB_DSN: postgres://gateway:gateway@postgres:5432/gateway
      GATEWAY_REDIS_URL: redis://redis:6379/0
      # `.env` (gitignored) overrides any of the below via ${VAR:-default}.
      # See .env.example for the keys we read.
      # Config is now loaded from Postgres (seeded by scripts/setup.sh).
      # GATEWAY_CONFIG is no longer used.
      GATEWAY_PROVIDER_MODE: ${GATEWAY_PROVIDER_MODE:-mock}
      GATEWAY_SECRETS_MODE: ${GATEWAY_SECRETS_MODE:-mock}
      GATEWAY_LOG_LEVEL: ${GATEWAY_LOG_LEVEL:-INFO}
      GATEWAY_RNG_SEED: ${GATEWAY_RNG_SEED:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GATEWAY_KEY_HASH_PEPPER: ${GATEWAY_KEY_HASH_PEPPER:-}
      GATEWAY_METRICS_TOKEN: ${GATEWAY_METRICS_TOKEN:-}
    ports: ["8000:8000"]
